<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Interactive Plan Builder PRO+</title>
<style>
body { margin:0; font-family:Arial; overflow:hidden; }
#project-bar { position:relative; z-index:1001; background:#111; color:#fff; padding:8px 10px; display:flex; align-items:center; gap:12px; }
#projectName { min-width:220px; padding:4px 6px; }
#saveStatus { font-size:13px; opacity:0.9; }
#toolbar { position:relative; z-index:1000; background:#222; color:#fff; padding:10px; }
#toolbar button,label { margin-right:10px; }
#plan-container { width:100%; height:calc(100vh - 92px); background:#eee; overflow:hidden; cursor:default; position:relative; }
#plan-wrapper { position:absolute; transform-origin:top left; }
#plan { display:block; max-width:none; user-select:none; -webkit-user-drag:none; }
.hotspot {
  position:absolute; width:10px; height:10px; border-radius:50%;
  border:2px solid #fff; cursor:pointer; transform:translate(-50%,-50%);
  transition:0.2s;
}
.hotspot:hover { width:18px; height:18px; }
.modal { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; }
.modal-content { background:#fff; padding:20px; max-width:600px; width:90%; border-radius:10px; }
#viewGallery img { width:72px; height:72px; object-fit:cover; margin:5px; cursor:zoom-in; border-radius:6px; }
#projectList button { width:100%; margin:5px 0; text-align:left; padding:8px; }
#imageModal { z-index:2000; }
#fullImage { max-width:92vw; max-height:92vh; object-fit:contain; }
</style>
</head>
<body>

<div id="project-bar">
  <label>Projet: <input id="projectName" type="text" placeholder="Nom du projet"></label>
  <span id="saveStatus"></span>
</div>

<div id="toolbar">
  <button onclick="toggleMode()">Mode: <span id="modeLabel">viewer</span></button>
  <button onclick="login('admin')">Login Admin</button>
  <button onclick="login('viewer')">Login Viewer</button>
  <button onclick="logout()">Logout</button>
  <label>📷 Plan <input type="file" id="imageUpload"></label>
  <button onclick="saveProject()">💾 Save</button>
  <button onclick="openProjectList()">📂 Load Project</button>
</div>

<div id="plan-container"><div id="plan-wrapper"><img id="plan"></div></div>

<div id="formModal" class="modal">
  <div class="modal-content">
    <h3>Créer / Modifier</h3>
    <input id="title" placeholder="Nom">
    <input type="color" id="color">
    <textarea id="desc"></textarea>
    <input type="file" id="imagesInput" multiple>
    <button onclick="saveHotspot()">OK</button>
    <button onclick="closeForm()">Annuler</button>
  </div>
</div>

<div id="viewModal" class="modal">
  <div class="modal-content">
    <h2 id="viewTitle"></h2>
    <p id="viewDesc"></p>
    <div id="viewGallery"></div>
    <button onclick="editHotspot()">Modifier</button>
    <button onclick="deleteHotspot()">Supprimer</button>
    <button onclick="closeView()">Fermer</button>
  </div>
</div>

<div id="imageModal" class="modal" onclick="closeFullImage()">
  <img id="fullImage" alt="Aperçu plein écran">
</div>

<div id="projectListModal" class="modal">
  <div class="modal-content">
    <h3>Projets sauvegardés</h3>
    <div id="projectList"></div>
    <button onclick="closeProjectList()">Fermer</button>
  </div>
</div>

<script>
let role='viewer';
function login(r){ role=r; alert('Connecté en '+r); }
function logout(){ role='viewer'; }
function toggleMode(){ if(role!=='admin') return alert('admin only'); }

const plan=document.getElementById('plan');
const wrapper=document.getElementById('plan-wrapper');
const container=document.getElementById('plan-container');
const projectNameInput=document.getElementById('projectName');
const saveStatus=document.getElementById('saveStatus');
const projectListModal=document.getElementById('projectListModal');
const projectList=document.getElementById('projectList');
plan.draggable=false;
plan.addEventListener('dragstart',e=>e.preventDefault());

let hotspots=[], tempCoords=null, editingId=null, currentView=null;
let lastSavedProjectName='project';
let hasCustomProjectName=false;

let scale=1, originX=0, originY=0;
let isDragging=false, moved=false, startX,startY;

// zoom doux avec centre à la souris
container.addEventListener('wheel',e=>{
 e.preventDefault();
 const rect=container.getBoundingClientRect();
 const mouseX=e.clientX-rect.left;
 const mouseY=e.clientY-rect.top;
 const zoom=e.deltaY<0?1.05:0.95;
 
 originX=mouseX-(mouseX-originX)*zoom;
 originY=mouseY-(mouseY-originY)*zoom;
 scale*=zoom;
 
 wrapper.style.transform=`translate(${originX}px,${originY}px) scale(${scale})`;
});

// pan uniquement drag
container.addEventListener('mousedown',e=>{
 if(e.button!==0) return;
 e.preventDefault();
 isDragging=true; moved=false;
 startX=e.clientX-originX; startY=e.clientY-originY;
 container.style.cursor='grabbing';
});

window.addEventListener('mousemove',e=>{
 if(!isDragging) return;
 if (originX!==e.clientX-startX && originY!==e.clientY-startY) moved=true;
 originX=e.clientX-startX; originY=e.clientY-startY;
 wrapper.style.transform=`translate(${originX}px,${originY}px) scale(${scale})`;
});

window.addEventListener('mouseup',()=>{
 isDragging=false;
 container.style.cursor='default';
});

// double click pour créer
container.addEventListener('click',e=>{
 if(moved) return;
 console.log("Click");
 if(role!=='admin') return;
 const rect=plan.getBoundingClientRect();
 tempCoords={ x:(e.clientX-rect.left)/rect.width, y:(e.clientY-rect.top)/rect.height };
 openForm();
});

function openForm(h=null){ formModal.style.display='flex'; if(h){ editingId=h.id; title.value=h.title; color.value=h.color; desc.value=h.desc;} else { editingId=null; title.value=''; desc.value=''; imagesInput.value=''; }}
function closeForm(){ formModal.style.display='none'; }

function saveHotspot(){
 const files=imagesInput.files;
 Promise.all([...files].map(f=>{
  const formData=new FormData(); formData.append('file',f);
  return fetch('/upload',{method:'POST',body:formData}).then(r=>r.text());
 })).then(urls=>{
  if(editingId){ let h=hotspots.find(h=>h.id===editingId); h.title=title.value; h.color=color.value; h.desc=desc.value; if(urls.length) h.images=urls; }
  else { hotspots.push({id:Date.now(),...tempCoords,title:title.value,color:color.value,desc:desc.value,images:urls}); }
  refresh(); closeForm();
 });
}

function createHotspotElement(h){
 const el=document.createElement('div'); el.className='hotspot';
 el.style.left=(h.x*100)+'%'; el.style.top=(h.y*100)+'%'; el.style.background=h.color;
 el.onclick=e=>{ e.stopPropagation(); openView(h); };
 wrapper.appendChild(el);
}

function refresh(){ wrapper.querySelectorAll('.hotspot').forEach(e=>e.remove()); hotspots.forEach(createHotspotElement); }

async function resolveImageUrl(src){
 if(!src || src.startsWith('data:') || /^https?:\/\//i.test(src)) return src;
 if(src.startsWith('/image/')) return src;
 try{
  const response=await fetch(`/image-url?src=${encodeURIComponent(src)}`);
  if(!response.ok) return src;
  return await response.text();
 }catch(_err){
  return src;
 }
}

async function openView(h){ currentView=h; viewTitle.innerText=h.title; viewDesc.innerText=h.desc; viewGallery.innerHTML='';
 const resolvedSources=await Promise.all((h.images||[]).map(resolveImageUrl));
 resolvedSources.forEach(src=>{ const img=document.createElement('img'); img.src=src; img.onclick=()=>showFullImage(src); viewGallery.appendChild(img); });
 viewModal.style.display='flex'; }
function closeView(){ viewModal.style.display='none'; }
function showFullImage(src){ fullImage.src=src; imageModal.style.display='flex'; }
function closeFullImage(){ imageModal.style.display='none'; fullImage.src=''; }
function closeProjectList(){ projectListModal.style.display='none'; }
function setSaveStatus(message,isError=false){ saveStatus.textContent=message; saveStatus.style.color=isError?'#ff9b9b':'#9dff9d'; }
function sanitizeProjectName(name){ const cleaned=(name||'').trim().replace(/\.json$/i,'').replace(/[<>:"/\\|?*\x00-\x1F]/g,'_').slice(0,120).trim(); return cleaned||'project'; }

projectNameInput.addEventListener('input',()=>{ hasCustomProjectName=true; });

async function loadProjectByName(name){
 const response=await fetch(`/project/${encodeURIComponent(name)}`);
 if(!response.ok) throw new Error('project not found');
 const data=await response.json();
 plan.src=data.image||'';
 hotspots=Array.isArray(data.hotspots)?data.hotspots:[];
 projectNameInput.value=data.projectName||name;
 lastSavedProjectName=sanitizeProjectName(data.projectName||name);
 hasCustomProjectName=true;
 refresh();
 closeProjectList();
 setSaveStatus(`Loaded: ${lastSavedProjectName}`);
}

async function openProjectList(){
 projectList.innerHTML='Chargement...';
 projectListModal.style.display='flex';
 try{
  const response=await fetch('/projects');
  const data=await response.json();
  const projects=Array.isArray(data.projects)?data.projects:[];
  if(!projects.length){ projectList.textContent='Aucun projet sauvegardé.'; return; }
  projectList.innerHTML='';
  projects.forEach(name=>{
   const btn=document.createElement('button');
   btn.textContent=name;
   btn.onclick=()=>loadProjectByName(name).catch(()=>setSaveStatus('Erreur chargement projet',true));
   projectList.appendChild(btn);
  });
 }catch(_err){
  projectList.textContent='Erreur lors du chargement des projets.';
 }
}

window.addEventListener('keydown',e=>{
 if(e.key!=='Escape') return;
 if(imageModal.style.display==='flex'){ closeFullImage(); return; }
 if(formModal.style.display==='flex'){ closeForm(); return; }
 if(viewModal.style.display==='flex'){ closeView(); return; }
 if(projectListModal.style.display==='flex'){ closeProjectList(); }
});
function editHotspot(){ if(role!=='admin') return; closeView(); openForm(currentView); }
function deleteHotspot(){ if(role!=='admin') return; hotspots=hotspots.filter(h=>h.id!==currentView.id); closeView(); refresh(); }

imageUpload.onchange=e=>{
 const selectedFile=e.target.files[0];
 if(selectedFile && !hasCustomProjectName){
  const baseName=selectedFile.name.replace(/\.[^.]+$/,'');
  const safeName=sanitizeProjectName(baseName);
  projectNameInput.value=safeName;
  lastSavedProjectName=safeName;
 }
 const r=new FileReader();
 r.onload=()=>plan.src=r.result;
 r.readAsDataURL(e.target.files[0]);
};

async function saveProject(){
 const projectName=sanitizeProjectName(projectNameInput.value||lastSavedProjectName);
 projectNameInput.value=projectName;
 try{
  const response=await fetch('/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({projectName,previousProjectName:lastSavedProjectName,image:plan.src,hotspots})});
  if(!response.ok) throw new Error('save failed');
  const result=await response.json();
  lastSavedProjectName=sanitizeProjectName(result.projectName||projectName);
  setSaveStatus(`Saved: ${lastSavedProjectName}`);
 }catch(_err){
  setSaveStatus('Erreur: projet non sauvegardé',true);
 }
}

</script>
</body>
</html>
