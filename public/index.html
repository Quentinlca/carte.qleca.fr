<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Interactive Plan Builder PRO+</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="project-bar">
  <div id="projectTitleWrap">
    <span id="projectNameText">project</span>
    <button id="projectSettingsBtn" onclick="openProjectSettings()" title="Project settings">⚙️</button>
  </div>
  <span id="saveStatus"></span>
</div>

<div id="toolbar">
  <button onclick="toggleMode()">Mode: <span id="modeLabel">viewer</span></button>
  <button onclick="login('admin')">Login Admin</button>
  <button onclick="login('viewer')">Login Viewer</button>
  <button onclick="logout()">Logout</button>
  <button onclick="openNewProjectModal()">📄 New Project</button>
  <button onclick="openProjectList()">📂 Load Project</button>
</div>

<div id="plan-container"><div id="plan-wrapper"><img id="plan"></div></div>

<div id="formModal" class="modal">
    <div class="modal-content">
        <h3>Nouveau point</h3>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <div>
                <label for="title">Nom</label>
                <input id="title" placeholder="Nom">
            </div>
            <div>
                <label for="color">Point color title</label>
                <input type="color" id="color">
            </div>
            <div>
                <label for="desc">Description</label>
                <textarea id="desc" placeholder="Description"></textarea>
            </div>
            <input type="file" id="imagesInput" multiple>
            <div style="display: flex; gap: 10px;">
                <button onclick="saveHotspot()">OK</button>
                <button onclick="closeForm()">Annuler</button>
            </div>
        </div>
    </div>
</div>

<div id="viewModal" class="modal">
  <div class="modal-content">
    <h2 id="viewTitle"></h2>
    <p id="viewDesc"></p>
    <div id="viewGallery"></div>
    <button onclick="editHotspot()">Modifier</button>
    <button onclick="deleteHotspot()">Supprimer</button>
    <button onclick="closeView()">Fermer</button>
  </div>
</div>

<div id="imageModal" class="modal" onclick="closeFullImage()">
  <img id="fullImage" alt="Aperçu plein écran">
</div>

<div id="projectListModal" class="modal">
  <div class="modal-content">
    <h3>Projets sauvegardés</h3>
    <div id="projectList"></div>
    <button onclick="closeProjectList()">Fermer</button>
  </div>
</div>

<div id="projectSettingsModal" class="modal">
  <div class="modal-content">
    <h3>Paramètres du projet</h3>
    <p><strong>Nom:</strong> <span id="settingsProjectName"></span></p>
    <p><strong>Créé le:</strong> <span id="settingsCreatedAt"></span></p>
    <p><strong>Dernière modification:</strong> <span id="settingsUpdatedAt"></span></p>
    <p><strong>Nombre de points:</strong> <span id="settingsPointCount"></span></p>
    <div id="projectActions">
      <button id="renameProjectBtn" onclick="openRenameProject()">🖉</button>
      <button id="duplicateProjectBtn" onclick="duplicateProject()">🗍</button>
      <button id="deleteProjectBtn" onclick="openDeleteProjectConfirm()">🗑️</button>
    </div>
    <button onclick="closeProjectSettings()">Fermer</button>
  </div>
</div>

<div id="renameProjectModal" class="modal">
  <div class="modal-content">
    <h3>Renommer le projet</h3>
    <input id="renameProjectInput" type="text" placeholder="Nouveau nom">
    <p id="renameError"></p>
    <button onclick="confirmRenameProject()">Valider</button>
    <button onclick="closeRenameProject()">Annuler</button>
  </div>
</div>

<div id="deleteProjectModal" class="modal">
  <div class="modal-content">
    <h3>Supprimer le projet</h3>
    <p>Confirmer la suppression de ce projet ?</p>
    <button onclick="confirmDeleteProject()">Oui, supprimer</button>
    <button onclick="closeDeleteProjectConfirm()">Annuler</button>
  </div>
</div>

<div id="newProjectModal" class="modal">
  <div class="modal-content">
    <h3>Nouveau projet</h3>
    <input id="newProjectName" type="text" placeholder="Nom du projet">
    <input id="newProjectImage" type="file" accept="image/*">
    <p id="newProjectError"></p>
    <button onclick="confirmCreateProject()">Créer</button>
    <button onclick="closeNewProjectModal()">Annuler</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
