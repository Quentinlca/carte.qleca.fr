<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion</title>
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
  <style>
    body { margin:0; font-family:Arial,sans-serif; min-height:100vh; display:grid; place-items:center; background:#111; color:#fff; }
    .card { width:min(92vw,380px); background:#1f1f1f; border:1px solid #333; border-radius:12px; padding:20px; }
    h1 { margin:0 0 14px; font-size:22px; }
    .field { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
    input { padding:10px; border-radius:8px; border:1px solid #444; background:#0f0f0f; color:#fff; }
    .password-row { display:flex; gap:8px; }
    .password-row input { flex:1; }
    .password-toggle { width:auto; padding:10px 12px; background:#3b3b3b; }
    button { width:100%; padding:10px; border:none; border-radius:8px; background:#4c8dff; color:#fff; cursor:pointer; }
    #loginError { color:#ff9b9b; min-height:18px; margin-top:10px; font-size:14px; }
    .hint { color:#bbb; font-size:12px; margin-top:10px; }
  </style>
</head>
<body>
  <form class="card" id="loginForm">
    <h1>Connexion</h1>
    <div class="field">
      <label for="username">Nom d'utilisateur</label>
      <input id="username" name="username" autocomplete="username" required />
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <div class="password-row">
        <input id="password" name="password" type="password" autocomplete="current-password" required />
        <button type="button" id="toggleLoginPassword" class="password-toggle">Voir</button>
      </div>
    </div>
    <button type="submit">Se connecter</button>
    <div id="loginError"></div>
  </form>

  <script>
    const form=document.getElementById('loginForm');
    const error=document.getElementById('loginError');
    const passwordInput=document.getElementById('password');
    const toggleLoginPassword=document.getElementById('toggleLoginPassword');

    toggleLoginPassword.addEventListener('click',()=>{
      const isHidden=passwordInput.type==='password';
      passwordInput.type=isHidden?'text':'password';
      toggleLoginPassword.textContent=isHidden?'Masquer':'Voir';
    });

    form.addEventListener('submit', async event => {
      event.preventDefault();
      error.textContent='';

      const username=document.getElementById('username').value.trim();
      const password=document.getElementById('password').value;

      try {
        const response=await fetch('/auth/login', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({username,password})
        });

        if(response.status===401){
          error.textContent='Identifiants invalides.';
          return;
        }

        if(!response.ok){
          error.textContent='Erreur de connexion.';
          return;
        }

        window.location.href='/';
      } catch (_err) {
        error.textContent='Serveur indisponible.';
      }
    });
  </script>
</body>
</html>
